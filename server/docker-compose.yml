# Standalone stack for the UGC backend. Runs on its own and publishes port 3001
# on the host — no proxy, no domain, no TLS. Reach it directly at:
#   http://<droplet-ip>:3001/health
#
# DEPLOY (from this dir, ~/ugc.result/server):
#   1. Create .env (see .env.example) with the API keys + IMAGEKIT_* vars.
#   2. docker compose up -d --build
#   3. docker compose logs -f
#
# NOTE: needs ~2GB+ RAM for the render step. On a 1GB droplet add swap first.

services:
  ugc:
    build:
      context: .
    image: ugc-backend:latest
    container_name: ugc-backend
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
