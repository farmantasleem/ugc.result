# Self-contained stack for the UGC backend, run entirely from ~/ugc.result/server.
# It brings its OWN Caddy that serves ugc.murga.app over HTTPS and proxies to the
# backend container. Nothing in the other project is touched.
#
# REQUIREMENT: ports 80/443 must be free on the droplet (only one process can
# own them). Check with: sudo lsof -i :80 -i :443
#
# DEPLOY (from this dir):
#   1. Create .env (see .env.example) with the API keys + IMAGEKIT_* vars.
#   2. Add DNS: A record  ugc.murga.app -> droplet IP.
#   3. docker compose up -d --build
#   4. docker compose logs -f
#
#   Then:  https://ugc.murga.app/health
#
# NOTE: needs ~2GB+ RAM for the render step. On a 1GB droplet add swap first.

services:
  ugc:
    build:
      context: .
    image: ugc-backend:latest
    container_name: ugc-backend
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    expose:
      - "3001"          # internal only; Caddy reaches it by service name
    networks:
      - ugc-net

  caddy:
    image: caddy:2-alpine
    container_name: ugc-caddy
    restart: unless-stopped
    depends_on:
      - ugc
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # persists issued certs — do NOT delete
      - caddy_config:/config
    networks:
      - ugc-net

networks:
  ugc-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
