# Standalone stack for the UGC backend. Runs on its own and publishes port 3001
# on the host, so it works regardless of your other stack. The domain
# (ugc.murga.app) is wired up separately by pointing your main stack's Caddy at
# this published port — see ./Caddyfile.fragment.
#
# DEPLOY (from this dir, ~/ugc.result/server):
#   1. Create .env (see .env.example) with the API keys + IMAGEKIT_* vars.
#   2. docker compose up -d --build
#   3. docker compose logs -f
#
# Reach it directly at:  http://<droplet-ip>:3001/health
#
# NOTE: this image needs ~2GB+ RAM for the background-removal step. On a 1GB
# droplet that step will be OOM-killed — add swap or size up (see chat notes).

services:
  ugc:
    build:
      context: .
    image: ugc-backend:latest
    container_name: ugc-backend
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
